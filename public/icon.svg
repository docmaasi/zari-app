<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="orb" cx="45%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#d8b4fe"/>
      <stop offset="25%" style="stop-color:#a78bfa"/>
      <stop offset="55%" style="stop-color:#7c5cfc"/>
      <stop offset="85%" style="stop-color:#4f8bff"/>
      <stop offset="100%" style="stop-color:#38b2ff"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" style="stop-color:#7c5cfc;stop-opacity:0"/>
      <stop offset="80%" style="stop-color:#4f8bff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#38b2ff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="shine" cx="38%" cy="32%" r="25%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="#0a0a14"/>
  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#glow)" stroke-width="8" opacity="0.5"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#7c5cfc" stroke-width="2" opacity="0.3"/>
  <!-- Main orb -->
  <circle cx="256" cy="256" r="180" fill="url(#orb)"/>
  <!-- Highlight -->
  <circle cx="220" cy="210" r="80" fill="url(#shine)"/>
</svg>
