  </defs>
  <rect width="512" height="512" rx="112" fill="#0b0b12"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="url(#ring)" stroke-width="14" opacity="0.9"/>
  <!-- Orb core -->
  <circle cx="256" cy="256" r="180" fill="url(#orb)"/>
  <!-- Shine -->
  <ellipse cx="208" cy="186" rx="62" ry="38" fill="url(#shine)"/>
  <!-- Z mark -->
  <path d="M 178 196 L 326 196 L 196 322 L 344 322"
        stroke="white"
