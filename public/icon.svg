<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="orb" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#ffd2e3"/>
      <stop offset="20%" stop-color="#ff7eb1"/>
      <stop offset="45%" stop-color="#ff3d8a"/>
      <stop offset="75%" stop-color="#b14aff"/>
      <stop offset="100%" stop-color="#5cf1ff"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#ff3d8a"/>
      <stop offset="50%" stop-color="#b14aff"/>
      <stop offset="100%" stop-color="#5cf1ff"/>
    </linearGradient>
    <radialGradient id="shine" cx="38%" cy="32%" r="25%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
